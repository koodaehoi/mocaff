<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOCAFF | OFFICIAL</title>
    <style>
        /* 1. 스크롤 방지 및 전체 화면 설정 */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Apple SD Gothic Neo', sans-serif; }
        
        body { display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 2vh 0; }

        .container { text-align: center; width: 95%; max-width: 1100px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        
        /* 2. 상단 헤더 섹션 */
        .header-section { margin-bottom: 2vh; }
        .logo { font-size: 1.8rem; letter-spacing: 10px; margin-bottom: 10px; color: #d4af37; font-weight: bold; }
        .main-text { font-size: 1rem; color: #fff; opacity: 0.9; margin-bottom: 5px; }
        .sub-text { font-size: 1.1rem; color: #d4af37; font-weight: 600; }
        
        /* 3. [핵심] 가로가 긴 라운드 직사각형 쇼케이스 */
        .showcase { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 3vw; width: 100%; }
        
        .media-item { flex: 1; max-width: 480px; display: flex; flex-direction: column; align-items: center; }
        
        /* 가로가 더 긴 직사각형 카드 스타일 (금색/핑크골드 광택) */
        .media-content { 
            width: 100%; 
            aspect-ratio: 1.6 / 1; /* 가로가 더 긴 황금 비율 */
            border-radius: 25px;   /* 부드러운 직사각형 모서리 */
            object-fit: cover; 
            transition: all 0.3s ease;
        }
        
        .hero-video { border: 1.5px solid rgba(212,175,55,0.4); box-shadow: 0 0 30px rgba(212,175,55,0.2); }
        .nft-image { border: 1.5px solid rgba(255,182,193,0.4); box-shadow: 0 0 30px rgba(255,182,193,0.2); }
        
        .media-caption { font-size: 0.95rem; color: #fff; margin-top: 15px; font-weight: 500; letter-spacing: -0.5px; }
        
        /* 4. 오픈씨 버튼 */
        .btn-wrapper { margin-top: 20px; }
        .opensea-btn { display: inline-block; padding: 10px 30px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 50px; font-size: 0.85rem; font-weight: 600; transition: all 0.3s ease; }
        .opensea-btn:hover { background: #d4af37; color: #000; }
        
        /* 5. 푸터 섹션 (최하단 고정) */
        .footer { padding-top: 10px; text-align: center; font-size: 0.75rem; color: #444; line-height: 1.5; }
        .footer a { color: #444; text-decoration: none; }

        /* 모바일 최적화: 모바일에서도 스크롤 없이 한 화면에 담기 */
        @media (max-width: 768px) {
            .showcase { flex-direction: column; gap: 2vh; }
            .media-item { width: 85%; }
            .logo { font-size: 1.5rem; }
            .media-content { aspect-ratio: 1.6 / 1; }
            .media-caption { margin-top: 8px; font-size: 0.85rem; }
            .sub-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="logo">MOCAFF</div>
        <div class="main-text">커피 생태계의 진정한 가치를 연결합니다.</div>
        <div class="sub-text">3월 25일, 그 가치를 경험하세요.</div>
    </div>

    <div class="container">
        <div class="showcase">
            <div class="media-item">
                <video class="media-content hero-video" autoplay muted loop playsinline>
                    <source src="mocaff_badge.mp4" type="video/mp4">
                </video>
                <div class="media-caption">MOCAFF VVIP BADGE</div>
            </div>
