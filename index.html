<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOCAFF</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; position: relative; }
        .container { text-align: center; width: 90%; padding-bottom: 80px; } /* 하단 공간 확보 */
        video { width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 0 40px rgba(212,175,55,0.4); margin-bottom: 30px; }
        .logo { font-size: 2rem; letter-spacing: 10px; margin-bottom: 25px; color: #d4af37; font-weight: bold; }
        .main-text { font-size: 1.1rem; color: #fff; font-weight: 400; margin-bottom: 12px; letter-spacing: -0.5px; opacity: 0.9; }
        .sub-text { font-size: 1.2rem; color: #d4af37; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 40px; }
        
        /* 하단 정보 레이아웃 */
        .footer { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 0.8rem; color: #666; line-height: 1.8; letter-spacing: -0.2px; }
        .footer a { color: #666; text-decoration: none; }
        .footer .address { font-style: normal; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MOCAFF</div>
        <video autoplay muted loop playsinline>
            <source src="mocaff_badge.mp4" type="video/mp4">
        </video>
        <div class="main-text">커피 생태계의 진정한 가치를 연결합니다.</div>
        <div class="sub-text">3월 25일, 그 가치를 경험하세요.</div>
    </div>

    <div class="footer">
        <a href="mailto:herring@mocaff.kr">herring@mocaff.kr</a><br>
        <address class="address">서울특별시 마포구 서강로 75-16 로비층 HERRING</address>
    </div>
</body>
</html>
