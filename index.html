<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOCAFF | 2026 헤링 봄 음악회 신청</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .H-wrap { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; box-sizing: border-box; min-height: 100vh; }
        .H-header { text-align: center; margin-bottom: 30px; width: 100%; }
        .H-logo { font-size: 1.8rem; letter-spacing: 10px; color: #d4af37; font-weight: bold; margin-bottom: 15px; }
        #H-timer { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .H-t-box { background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.3); padding: 10px; border-radius: 10px; min-width: 55px; text-align: center; }
        .H-t-num { display: block; font-size: 1.3rem; color: #d4af37; font-weight: bold; }
        .H-t-lab { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .H-grid { display: flex; flex-wrap: wrap; gap: 40px; width: 100%; max-width: 900px; justify-content: center; margin-bottom: 50px; }
        .H-card { flex: 1; min-width: 280px; max-width: 420px; text-align: center; }
        .H-media { width: 100%; aspect-ratio: 16 / 10; border-radius: 15px; object-fit: contain; background: #080808; padding: 10px; border: 1.5px solid rgba(212, 175, 55, 0.4); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); box-sizing: border-box; display: block; }
        .H-btn { display: inline-block; margin-top: 15px; padding: 12px 30px; border: 1.5px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 50px; font-size: 0.85rem; font-weight: 600; }
        
        /* 신청 폼 영역 */
        .H-form-area { width: 100%; max-width: 500px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.25); border-radius: 20px; padding: 35px 15px; text-align: center; box-sizing: border-box; }
        .H-f-title { font-size: 1.4rem; color: #d4af37; margin-bottom: 15px; font-weight: bold; }
        .H-f-desc { font-size: 0.88rem; color: #ccc; margin-bottom: 25px; line-height: 1.6; word-break: keep-all; }
        .H-input { width: 100%; max-width: 400px; padding: 14px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem; border-radius: 8px; }
        
        /* [추가] 개인정보 동의 스타일 */
        .H-privacy { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; font-size: 0.75rem; color: #888; cursor: pointer; }
        .H-privacy input { accent-color: #d4af37; cursor: pointer; }
        .H-privacy span { text-decoration: underline; text-underline-offset: 2px; }

        .H-submit { width: 100%; max-width: 400px; padding: 16px; background: #d4af37; border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .H-footer { margin-top: 50px; font-size: 0.75rem; color: #444; text-align: center; line-height: 1.6; padding-bottom: 40px; }
        
        @media (max-width: 768px) { .H-grid { flex-direction: column; align-items: center; } .H-card { width: 100%; } .H-f-desc { font-size: 0.82rem; } }
    </style>
</head>
<body>
    <div class="H-wrap">
        <div class="H-header">
            <div class="H-logo">MOCAFF</div>
            <div id="H-timer">
                <div class="H-t-box"><span class="H-t-num" id="d">00</span><span class="H-t-lab">Day</span></div>
                <div class="H-t-box"><span class="H-t-num" id="h">00</span><span class="H-t-lab">Hrs</span></div>
                <div class="H-t-box"><span class="H-t-num" id="m">00</span><span class="H-t-lab">Min</span></div>
                <div class="H-t-box"><span class="H-t-num" id="s">00</span><span class="H-t-lab">Sec</span></div>
            </div>
            <div style="font-size: 1rem; color: #d4af37; font-weight: 600;">3월 25일, 대단원의 막이 오릅니다.</div>
        </div>

        <div class="H-grid">
            <div class="H-card">
                <video class="H-media" autoplay muted loop playsinline poster="nft_badge.jpg"><source src="mocaff_badge.mp4" type="video/mp4"></video>
                <div style="margin-top:10px; font-size:0.9rem;">MOCAFF VVIP BADGE</div>
            </div>
            <div class="H-card">
                <img src="nft_badge.jpg" class="H-media" alt="MOCAFF NFT">
                <div style="margin-top:10px; font-size:0.9rem;">SPRING COFFEE CONCERT NFT</div>
                <a href="https://opensea.io/assets/polygon/0x0172a6ace69916736e395c750fccce5305e726ac/0" target="_blank" class="H-btn">OWN THE VALUE</a>
            </div>
        </div>

        <div class="H-form-area">
            <div class="H-f-title">2026 헤링 봄 음악회 신청</div>
            <p class="H-f-desc">참석을 희망하는 분의 성함과 연락처를 남겨 주시면<br>당첨 시 연락 드립니다.</p>
            
            <form action="https://formspree.io/f/xkoqwjrl" method="POST">
                <input type="text" name="성함" class="H-input" placeholder="성함" required>
                <input type="tel" name="연락처" class="H-input" placeholder="연락처" required>
                
                <label class="H-privacy">
                    <input type="checkbox" name="개인정보동의" required>
                    <span>[필수] 개인정보 수집 및 이용에 동의합니다.</span>
                </label>

                <button type="submit" class="H-submit">신청하기</button>
            </form>
        </div>

        <div class="H-footer">herring@mocaff.kr<br>서울특별시 마포구 서강로 75-16 로비층 HERRING</div>
    </div>

    <script>
        function update() {
            const target = new Date("March 25, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            if (diff <= 0) { document.getElementById("H-timer").innerHTML = "D-DAY"; return; }
            document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24)).toString().padStart(2,'0');
            document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60)).toString().padStart(2,'0');
            document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60)).toString().padStart(2,'0');
            document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000).toString().padStart(2,'0');
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
