<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOCAFF | OFFICIAL</title>
    <style>
        /* 1. 기본 배경 및 스크롤 설정 */
        body, html { margin: 0; padding: 0; width: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        /* 전체 컨테이너 */
        .wrapper { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; box-sizing: border-box; min-height: 100vh; }

        /* 2. 헤더 섹션 */
        .header { text-align: center; margin-bottom: 30px; width: 100%; }
        .logo { font-size: 1.8rem; letter-spacing: 10px; color: #d4af37; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        
        /* 카운트다운 박스 */
        #timer { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .t-box { background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.3); padding: 10px; border-radius: 10px; min-width: 55px; text-align: center; }
        .t-num { display: block; font-size: 1.3rem; color: #d4af37; font-weight: bold; }
        .t-lab { font-size: 0.6rem; color: #888; text-transform: uppercase; }

        /* 3. 콘텐츠 그리드 (PC 좌우, 모바일 상하) */
        .grid { display: flex; flex-direction: row; flex-wrap: wrap; gap: 40px; width: 100%; max-width: 900px; justify-content: center; margin-bottom: 50px; }
        .card { flex: 1; min-width: 280px; max-width: 420px; text-align: center; }
        
        /* 미디어 박스: 스마트폰에서 절대 깨지지 않도록 비율 고정 */
        .media { 
            width: 100%; aspect-ratio: 16 / 10; border-radius: 15px; 
            object-fit: contain; background: #080808; padding: 10px; 
            border: 1.5px solid rgba(212, 175, 55, 0.4); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); 
            box-sizing: border-box; display: block; 
        }
        
        .cap { font-size: 0.9rem; margin-top: 12px; color: #eee; font-weight: 500; }
        .btn { display: inline-block; margin-top: 15px; padding: 12px 30px; border: 1.5px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 50px; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }

        /* 4. VIP 신청 폼 */
        .form-area { width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 30px; text-align: center; box-sizing: border-box; }
        .f-title { font-size: 1.2rem; color: #d4af37; margin-bottom: 8px; font-weight: bold; }
        .f-desc { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
        .input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem; -webkit-appearance: none; }
        .submit { width: 100%; padding: 14px; background: #d4af37; border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; }

        /* 5. 푸터 */
        .footer { margin-top: 50px; font-size: 0.75rem; color: #444; text-align: center; line-height: 1.6; }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .grid { flex-direction: column; align-items: center; gap: 30px; }
            .card { width: 100%; }
            .logo { font-size: 1.5rem; letter-spacing: 8px; }
        }
    </style>
</head>
