<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOCAFF | OFFICIAL</title>
    <style>
        /* 1. 기본 설정: 스크롤 허용으로 변경 */
        body, html { margin: 0; padding: 0; width: 100%; background: #000; color: #fff; font-family: 'Apple SD Gothic Neo', sans-serif; overflow-x: hidden; }
        
        /* 전체 컨테이너 여백 확보 */
        .wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 60px 20px; box-sizing: border-box; min-height: 100vh;
        }

        /* 2. 헤더 섹션 */
        .header { text-align: center; margin-bottom: 50px; }
        .logo { font-size: 2rem; letter-spacing: 12px; color: #d4af37; font-weight: bold; margin-bottom: 15px; }
        .txt1 { font-size: 1rem; opacity: 0.8; margin-bottom: 5px; line-height: 1.4; }
        .txt2 { font-size: 1.2rem; color: #d4af37; font-weight: 600; letter-spacing: -0.5px; }
        
        /* 3. 쇼케이스 (PC는 좌우, 모바일은 상하 자동 전환) */
        .showcase { 
            display: flex; flex-wrap: wrap; 
            gap: 60px; width: 100%; max-width: 1000px; 
            justify-content: center; align-items: flex-start; 
        }
        
        .card { flex: 1; min-width: 320px; max-width: 450px; text-align: center; }
        
        /* 4. 가로가 긴 직사각형 카드 (이미지 잘림 절대 방지) */
        .media-box { 
            width: 100%; aspect-ratio: 1.6 / 1; 
            border-radius: 20px; 
            object-fit: contain; /* 뱃지 전체 노출 */
            background: #080808; 
            padding: 15px;
            border: 1.5px solid rgba(212,175,55,0.4); 
            box-shadow: 0 0 30px rgba(212,175,55,0.2);
            box-sizing: border-box; display: block;
        }
        
        .cap { font-size: 0.95rem; margin-top: 15px; font-weight: 500; color: #eee; }
        .btn { 
            display: inline-block; margin-top: 20px; padding: 12px 35px; 
            border: 1.5px solid #d4af37; color: #d4af37; text-decoration: none; 
            border-radius: 50px; font-size: 0.9rem; font-weight: 600; transition: 0.3s;
        }
        .btn:hover { background: #d4af37; color: #000; }
        
        /* 5. 푸터 */
        .footer { margin-top: 80px; font-size: 0.8rem; color: #555; text-align: center; line-height: 1.8; padding-bottom: 40px; }

        /* 모바일 대응: 화면 너비가 좁아지면 간격 조정 */
        @media (max-width: 768px) {
            .wrapper { padding: 40px 15px; }
            .showcase { gap: 50px; }
            .logo { font-size: 1.7rem; }
            .txt1 { font-size: 0.9rem; }
            .txt2 { font-size: 1.1rem; }
            .card { min-width: 100%; } /* 모바일에서 카드를 꽉 차게 */
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="logo">MOCAFF</div>
            <div class="txt1">커피 생태계의 진정한 가치를 연결합니다.</div>
            <div class="txt2">3월 25일, 그 가치를 경험하세요.</div>
        </div>

        <div class="showcase">
            <div class="card">
                <video class="media-box" autoplay muted loop playsinline>
                    <source src="mocaff_badge.mp4" type="video/mp4">
                </video>
                <div class="cap">MOCAFF VVIP BADGE</div>
            </div>
            
            <div class="card">
                <img src="nft_badge.jpg" alt="NFT" class="media-box" style="border-color: rgba(255,182,193,0.4);">
                <div class="cap">SPRING COFFEE CONCERT</div>
                <a href="https://opensea.io/assets/polygon/0x0172a6ace69916736e395c750fccce5305e726ac/0" target="_blank" class="btn">OWN THE VALUE</a>
            </div>
        </div>

        <div class="footer">
            herring@mocaff.kr<br>
            서울특별시 마포구 서강로 75-16 로비층 HERRING
        </div>
    </div>
</body>
</html>
