<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOCAFF | OFFICIAL</title>
    <style>
        /* 1. 스크롤 방지 & 전체 화면 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Apple SD Gothic Neo', sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        
        .wrapper { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; }
        
        /* 2. 헤더 섹션 */
        .header { text-align: center; margin-bottom: 5vh; }
        .logo { font-size: 1.8rem; letter-spacing: 12px; color: #d4af37; font-weight: bold; margin-bottom: 10px; }
        .txt1 { font-size: 1rem; opacity: 0.8; margin-bottom: 5px; }
        .txt2 { font-size: 1.2rem; color: #d4af37; font-weight: 600; }
        
        /* 3. [핵심 수정] 간격을 100px로 대폭 확대 (기존보다 훨씬 넓게) */
        .showcase { 
            display: flex; 
            flex-direction: row; 
            gap: 100px !important; 
            width: 100%; 
            justify-content: center; 
            align-items: flex-start; 
        }
        
        .card { flex: 1; max-width: 450px; text-align: center; }
        
        /* 4. [이미지 잘림 방지] object-fit: contain 과 여백(padding) 추가 */
        .media-box-new { 
            width: 100%; 
            aspect-ratio: 1.6 / 1; 
            border-radius: 20px !important; 
            object-fit: contain !important; /* 이미지 전체가 다 보이게 설정 */
            background: #000;
            border: 2px solid rgba(212,175,55,0.4); 
            box-shadow: 0 0 30px rgba(212,175,55,0.2);
            padding: 15px !important; /* 테두리 안쪽 여백을 주어 잘림 절대 방지 */
            box-sizing: border-box;
            display: block;
        }
        
        .cap { font-size: 0.9rem; margin-top: 20px; font-weight: 500; color: #eee; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 35px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 50px; font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .btn:hover { background: #d4af37; color: #000; }
        
        /* 5. 푸터 */
        .footer { margin-top: 5vh; font-size: 0.75rem; color: #555; text-align: center; line-height: 1.6; }

        /* 모바일 대응 (간격 조정) */
        @media (max-width: 800px) {
            .showcase { flex-direction: column; align-items: center; gap: 40px !important; }
            .card { width: 90%; }
            .media-box-new { aspect-ratio: 1.6 / 1; padding: 10px !important; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="logo">MOCAFF</div>
            <div class="txt1">커피 생태계의 진정한 가치를 연결합니다.</div>
            <div class="txt2">3월 25일, 그 가치를 경험하세요.</div>
        </div>

        <div class="showcase">
            <div class="card">
                <video class="media-box-new" autoplay muted loop playsinline>
                    <source src="mocaff_badge.mp4" type="video/mp4">
                </video>
                <div class="cap">MOCAFF VVIP BADGE</div>
            </div>
            
            <div class="card">
                <img src="nft_badge.jpg" alt="NFT" class="media-box-new" style="border-color: rgba(255,182,193,0.4);">
                <div class="cap">SPRING COFFEE CONCERT</div>
                <a href="https://opensea.io/assets/polygon/0x0172a6ace69916736e395c750fccce5305e726ac/0" target="_blank" class="btn">OWN THE VALUE</a>
            </div>
        </div>

        <div class="footer">
            herring@mocaff.kr<br>
            서울특별시 마포구 서강로 75-16 로비층 HERRING
        </div>
    </div>
</body>
</html>
